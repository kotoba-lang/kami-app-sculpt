<!DOCTYPE html>
<html>
  <head><meta charset="utf-8"><title>Kami Sculpt</title><style>body { margin: 0; font-family: system-ui; background: #17131d; color: #f7efff; }
header { padding: 16px; background: #2a2034; }
main { display: grid; grid-template-columns: 240px 1fr 230px; min-height: calc(100vh - 52px); }
aside { padding: 18px; background: #21192a; }
.viewport { display: grid; place-items: center; background: radial-gradient(circle,#815783,#38253f 52%,#17131d); }
.clay { width: 280px; height: 330px; border-radius: 48% 52% 45% 55% / 52% 42% 58% 48%; background: radial-gradient(circle at 40% 30%,#f2b9b5,#a85f73 55%,#593346); box-shadow: inset -40px -40px #733a54,0 25px 70px #0008; }
button { display: block; width: 100%; margin: 8px 0; padding: 10px; background: #51375e; color: #fff; border: 1px solid #a87eb5; border-radius: 6px; }
input { width: 100%; accent-color: #e6a0d4; }</style></head>
  <body>
    <header>
      <strong>KAMI SCULPT · DIGITAL CLAY</strong>
    </header>
    <main>
      <aside>
        <h3>Brushes</h3>
        <button>Draw</button>
        <button>Clay buildup</button>
        <button>Smooth</button>
        <button>Crease</button>
        <h3>Symmetry</h3>
        <button>X mirror · on</button>
      </aside>
      <section class="viewport">
        <div class="clay"></div>
      </section>
      <aside>
        <h3>Brush settings</h3>
        <label>Radius<input type="range" value="45"></label>
        <label>Strength<input type="range" value="62"></label>
        <h3>Layers</h3>
        <button>Base form</button>
        <button>Detail layer</button>
      </aside>
    </main>
  </body>
</html>
