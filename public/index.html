<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="data:,"><title>Kami Sculpt</title><style>aside:last-child { border-left: 1px solid #51375e; border-right: 0; }
.stats { position: absolute; right: 14px; bottom: 14px; background: #170d1dcc; padding: 8px; }
* { box-sizing: border-box; }
.viewport { position: relative; }
body { margin: 0; height: 100vh; display: grid; grid-template-rows: 52px 1fr; font-family: Inter,system-ui; background: #17131d; color: #f7efff; }
label { display: grid; gap: 5px; margin: 12px 0; }
.selected,.primary { background: #d18ab9; color: #271225; font-weight: 700; }
h2 { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #d6afd8; }
button,input,select { width: 100%; margin: 5px 0; padding: 9px; background: #51375e; color: #fff; border: 1px solid #a87eb5; border-radius: 6px; }
main { display: grid; grid-template-columns: 240px 1fr 250px; min-height: 0; }
header .spacer { flex: 1; }
#gpu-canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
#gpu-status { position: absolute; left: 50%; top: 45%; transform: translate(-50%,-50%); color: #ffb0b0; }
aside { padding: 16px; background: #21192a; border-right: 1px solid #51375e; }
header { display: flex; align-items: center; gap: 18px; padding: 0 16px; background: #2a2034; }
button { cursor: pointer; text-align: left; }</style></head>
  <body>
    <header>
      <strong>KAMI SCULPT · DIGITAL CLAY</strong>
      <a href="https://kotoba-lang.github.io/kami-studio/">Studio</a>
      <span>WebGPU brush workspace</span>
      <span class="spacer"></span>
      <button id="undo">Undo stroke</button>
      <button id="redo">Redo</button>
      <button id="export">Export EDN</button>
    </header>
    <main>
      <aside>
        <h2>Brushes</h2>
        <button class="selected" data-mode="inflate">Inflate</button>
        <button data-mode="smooth">Smooth</button>
        <button data-mode="pinch">Pinch</button>
        <h2>Symmetry</h2>
        <select id="symmetry">
          <option value="x">X mirror</option>
          <option value="">Off</option>
          <option value="y">Y mirror</option>
          <option value="z">Z mirror</option>
        </select>
      </aside>
      <section class="viewport">
        <canvas id="gpu-canvas" aria-label="Sculpt WebGPU viewport"></canvas>
        <div id="gpu-status">Initializing WebGPU…</div>
        <div class="stats" id="stats">153 vertices · 256 triangles · 0 strokes</div>
      </section>
      <aside>
        <h2>Brush settings</h2>
        <label>Radius<output id="radius-value">0.60</output><input id="radius" type="range" min="0.1" max="1.5" step="0.05" value="0.6"></label>
        <label>Strength<output id="strength-value">0.12</output><input id="strength" type="range" min="-0.3" max="0.3" step="0.01" value="0.12"></label>
        <h2>Layers</h2>
        <button class="primary">Base form</button>
        <button>Detail layer</button>
        <p>Drag directly on the clay to apply deterministic mesh strokes.</p>
      </aside>
    </main>
    <script src="./js/app.js"></script>
  </body>
</html>
